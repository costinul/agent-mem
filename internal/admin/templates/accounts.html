{{template "layout.html" .}}
{{define "content"}}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold text-gray-900">Accounts</h2>
    <form hx-post="/admin/accounts" hx-target="#account-list" hx-swap="beforeend" class="flex gap-2">
        <input type="text" name="name" placeholder="Account name" required
               class="px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <button type="submit"
                class="px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors">
            Create
        </button>
    </form>
</div>
<div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th class="text-left px-4 py-3 font-medium text-gray-500">ID</th>
                <th class="text-left px-4 py-3 font-medium text-gray-500">Name</th>
                <th class="text-left px-4 py-3 font-medium text-gray-500">Created</th>
                <th class="text-right px-4 py-3 font-medium text-gray-500">Actions</th>
            </tr>
        </thead>
        <tbody id="account-list" class="divide-y divide-gray-100">
            {{range .Accounts}}
            <tr id="account-{{.ID}}">
                <td class="px-4 py-3 font-mono text-xs text-gray-600">
                    <a href="/admin/accounts/{{.ID}}" class="hover:underline text-blue-600">{{.ID}}</a>
                </td>
                <td class="px-4 py-3 text-gray-900">
                    <a href="/admin/accounts/{{.ID}}" class="hover:underline">{{.Name}}</a>
                </td>
                <td class="px-4 py-3 text-gray-500">{{.CreatedAt.Format "2006-01-02 15:04"}}</td>
                <td class="px-4 py-3 text-right">
                    <button hx-delete="/admin/accounts/{{.ID}}"
                            hx-target="#account-{{.ID}}"
                            hx-swap="outerHTML swap:0.3s"
                            hx-confirm="Delete this account? This will cascade-delete all agents, threads, events, and facts."
                            class="text-xs text-red-600 hover:text-red-800 font-medium">Delete</button>
                </td>
            </tr>
            {{else}}
            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-400">No accounts yet</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
