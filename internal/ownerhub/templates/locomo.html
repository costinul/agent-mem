{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6">
    <div class="flex items-center gap-2">
        <h2 class="text-lg font-semibold text-gray-900">Locomo Explorer</h2>
        {{if .LocomoSourceID}}
        <span class="inline-flex items-center gap-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-200 px-2 py-0.5 text-xs font-mono">
            source: {{.LocomoSourceID}}
        </span>
        {{end}}
    </div>
    <p class="text-sm text-gray-500 mt-1">Search the LoCoMo-10 dataset by turn text or dia_id (e.g. D1:12 or D112), then recall facts from the live DB.</p>
</div>

<!-- Context picker -->
<div class="bg-white rounded-lg border border-gray-200 p-5 mb-6">
    <h3 class="text-sm font-semibold text-gray-700 mb-4">DB Context <span class="text-gray-400 font-normal text-xs ml-1">for fact recall</span></h3>
    <div class="grid grid-cols-3 gap-5">
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Account</label>
            <select id="ctx-account"
                    hx-get="/ownerhub/playground/agents"
                    hx-target="#ctx-agent-select"
                    hx-include="[id='ctx-account']"
                    hx-vals="js:{account_id: document.getElementById('ctx-account').value}"
                    hx-trigger="change"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">— select account —</option>
                {{range .Accounts}}
                <option value="{{.ID}}" {{if eq $.LocomoAccountID .ID}}selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </div>

        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Agent</label>
            <div class="relative">
                <input id="ctx-agent-search" type="text" placeholder="Search agents…"
                       value="{{range .Agents}}{{if eq .ID $.LocomoAgentID}}{{.Name}} ({{.ID}}){{end}}{{end}}"
                       oninput="filterCombo('ctx-agent-select', this.value)"
                       onfocus="document.getElementById('ctx-agent-dropdown').classList.remove('hidden')"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <div id="ctx-agent-dropdown"
                     class="hidden absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-52 overflow-y-auto">
                    <select id="ctx-agent-select" size="6"
                            hx-get="/ownerhub/playground/threads"
                            hx-target="#ctx-thread-select"
                            hx-vals="js:{agent_id: document.getElementById('ctx-agent-select').value}"
                            hx-trigger="change"
                            onchange="pickCombo('ctx-agent', 'ctx-agent-dropdown')"
                            class="w-full text-sm border-0 focus:outline-none [&>option]:px-3 [&>option]:py-2 [&>option]:cursor-pointer [&>option:hover]:bg-blue-50">
                        {{if .Agents}}
                            <option value="">— select agent —</option>
                            {{range .Agents}}
                            <option value="{{.ID}}" {{if eq .ID $.LocomoAgentID}}selected{{end}}>{{.Name}} ({{.ID}})</option>
                            {{end}}
                        {{else}}
                            <option value="">— select account first —</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <input id="ctx-agent-value" type="hidden" value="{{.LocomoAgentID}}">
        </div>

        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Thread <span class="text-gray-400 font-normal">(optional)</span></label>
            <div class="relative">
                <input id="ctx-thread-search" type="text" placeholder="Search threads…"
                       value="{{range .Threads}}{{if eq .ID $.LocomoThreadID}}{{.ID}}{{end}}{{end}}"
                       oninput="filterCombo('ctx-thread-select', this.value)"
                       onfocus="document.getElementById('ctx-thread-dropdown').classList.remove('hidden')"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                <div id="ctx-thread-dropdown"
                     class="hidden absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-52 overflow-y-auto">
                    <select id="ctx-thread-select" size="6"
                            onchange="pickCombo('ctx-thread', 'ctx-thread-dropdown')"
                            class="w-full text-sm border-0 focus:outline-none [&>option]:px-3 [&>option]:py-2 [&>option]:cursor-pointer [&>option:hover]:bg-blue-50">
                        {{if .Threads}}
                            <option value="">— no thread —</option>
                            {{range .Threads}}
                            <option value="{{.ID}}" {{if eq .ID $.LocomoThreadID}}selected{{end}}>{{.ID}} ({{.CreatedAt.Format "Jan 2 15:04"}})</option>
                            {{end}}
                        {{else}}
                            <option value="">— select agent first —</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <input id="ctx-thread-value" type="hidden" value="{{.LocomoThreadID}}">
        </div>
    </div>
</div>

<!-- Search -->
<div class="bg-white rounded-lg border border-gray-200 p-5 mb-6">
    <div class="flex gap-3">
        <input id="search-input" type="text" value="{{.LocomoQuery}}" placeholder="Search by question, turn text, or dia_id (e.g. D1:12, D112, &quot;When did Melanie paint&quot;)…"
               class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               onkeydown="if(event.key==='Enter') doSearch()">
        <button onclick="doSearch()"
                class="inline-flex items-center gap-2 bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-md hover:bg-blue-700 transition-colors">
            <span id="spinner-search" class="hidden">
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
            </span>
            Search
        </button>
    </div>
    <p id="search-count" class="mt-2 text-xs text-gray-400 hidden"></p>
</div>

<!-- Results -->
<div id="search-results" class="space-y-4"></div>

<script>
var initialLocomoContext = {
    accountID: {{printf "%q" .LocomoAccountID}},
    agentID: {{printf "%q" .LocomoAgentID}},
    threadID: {{printf "%q" .LocomoThreadID}},
    query: {{printf "%q" .LocomoQuery}}
};

// ─── Combobox helpers (same pattern as playground) ───────────────────────────
function filterCombo(selectId, q) {
    q = q.toLowerCase();
    document.querySelectorAll('#' + selectId + ' option').forEach(function(o) {
        o.style.display = o.text.toLowerCase().includes(q) ? '' : 'none';
    });
}
function pickCombo(prefix, dropdownId) {
    var sel = document.getElementById(prefix + '-select');
    var opt = sel.options[sel.selectedIndex];
    if (!opt) return;
    document.getElementById(prefix + '-value').value = opt.value;
    document.getElementById(prefix + '-search').value = opt.text;
    document.getElementById(dropdownId).classList.add('hidden');
}
document.addEventListener('click', function(e) {
    ['ctx-agent-dropdown','ctx-thread-dropdown'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el && !el.contains(e.target) && !el.previousElementSibling.contains(e.target)) {
            el.classList.add('hidden');
        }
    });
});

// ─── Search ───────────────────────────────────────────────────────────────────
function doSearch() {
    var q = document.getElementById('search-input').value.trim();
    if (!q) return;

    document.getElementById('spinner-search').classList.remove('hidden');
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-count').classList.add('hidden');

    fetch('/ownerhub/locomo/search?q=' + encodeURIComponent(q))
        .then(function(r) {
            return r.json().then(function(data) {
                if (!r.ok) throw new Error(data.error || r.statusText);
                return data;
            });
        })
        .then(function(data) {
            document.getElementById('spinner-search').classList.add('hidden');
            renderHits(data.hits || []);
        })
        .catch(function(err) {
            console.error('locomo search error:', err);
            document.getElementById('spinner-search').classList.add('hidden');
            document.getElementById('search-results').innerHTML =
                '<div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">Search failed: ' + escHtml(String(err.message || err)) + '</div>';
        });
}

// ─── Render hits ──────────────────────────────────────────────────────────────
function renderHits(hits) {
    var container = document.getElementById('search-results');
    var countEl = document.getElementById('search-count');

    countEl.textContent = hits.length + ' turn' + (hits.length !== 1 ? 's' : '') + ' found';
    countEl.classList.remove('hidden');

    if (hits.length === 0) {
        container.innerHTML = '<div class="text-sm text-gray-500">No matching turns found.</div>';
        return;
    }

    container.innerHTML = hits.map(function(hit, idx) {
        var imgHtml = '';
        if (hit.img_url && hit.img_url.length > 0) {
            imgHtml = '<div class="mt-3 flex gap-3 flex-wrap">' +
                hit.img_url.map(function(url) {
                    return '<img src="' + escHtml(url) + '" alt="turn image" class="max-h-48 rounded border border-gray-200 object-contain">';
                }).join('') +
                '</div>';
            if (hit.blip_caption) {
                imgHtml += '<p class="mt-1.5 text-xs text-gray-500 italic">' + escHtml(hit.blip_caption) + '</p>';
            }
        }

        var qaHtml = '';
        if (hit.qa_refs && hit.qa_refs.length > 0) {
            qaHtml = '<div class="mt-3 pt-3 border-t border-gray-100">' +
                '<p class="text-xs font-medium text-gray-500 mb-1.5">Referenced by QA</p>' +
                '<div class="space-y-1">' +
                hit.qa_refs.map(function(qa) {
                    return '<div class="flex gap-2 text-xs">' +
                        '<span class="shrink-0 font-medium text-gray-700">Q:</span>' +
                        '<span class="text-gray-700">' + escHtml(qa.question) + '</span>' +
                        '<span class="shrink-0 text-gray-400 mx-1">→</span>' +
                        '<span class="text-gray-500">' + escHtml(qa.answer) + '</span>' +
                        '</div>';
                }).join('') +
                '</div></div>';
        }

        return '<div class="bg-white rounded-lg border border-gray-200 p-4" id="hit-' + idx + '">' +
            '<div class="flex items-start justify-between gap-4">' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="flex items-center gap-2 mb-2">' +
                        '<span class="font-mono text-xs font-medium text-blue-700 bg-blue-50 px-2 py-0.5 rounded">' + escHtml(hit.dia_id) + '</span>' +
                        '<span class="text-xs font-medium text-gray-700">' + escHtml(hit.speaker) + '</span>' +
                        '<span class="text-xs text-gray-400">·</span>' +
                        '<span class="text-xs text-gray-500">' + escHtml(hit.sample_id) + '</span>' +
                        '<span class="text-xs text-gray-400">·</span>' +
                        '<span class="text-xs text-gray-500">' + escHtml(hit.session_date) + '</span>' +
                    '</div>' +
                    '<p class="text-sm text-gray-900">' + escHtml(hit.text) + '</p>' +
                    imgHtml +
                    qaHtml +
                '</div>' +
                '<button onclick="recallFacts(' + idx + ')" ' +
                    'class="shrink-0 inline-flex items-center gap-1.5 text-xs font-medium text-gray-600 border border-gray-300 rounded-md px-3 py-1.5 hover:bg-gray-50 transition-colors" ' +
                    'data-text="' + escAttr(hit.text) + '">' +
                    '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>' +
                    'Get Facts' +
                '</button>' +
            '</div>' +
            '<div id="facts-' + idx + '" class="hidden mt-3 pt-3 border-t border-gray-100"></div>' +
        '</div>';
    }).join('');
}

// ─── Recall facts for a hit ───────────────────────────────────────────────────
function recallFacts(idx) {
    var accountID = document.getElementById('ctx-account').value;
    var agentID = document.getElementById('ctx-agent-value').value;
    var threadID = document.getElementById('ctx-thread-value').value;
    var btn = document.querySelector('#hit-' + idx + ' button[onclick]');
    var text = btn ? btn.getAttribute('data-text') : '';

    if (!accountID || !agentID) {
        alert('Select an account and agent first.');
        return;
    }
    if (!text) return;

    var factsEl = document.getElementById('facts-' + idx);
    factsEl.innerHTML = '<div class="flex items-center gap-2 text-xs text-gray-500"><svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>Recalling…</div>';
    factsEl.classList.remove('hidden');

    fetch('/ownerhub/locomo/recall', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({account_id: accountID, agent_id: agentID, thread_id: threadID, text: text})
    })
    .then(function(r) {
        return r.json().then(function(data) {
            if (!r.ok) throw new Error(data.error || r.statusText);
            return data;
        });
    })
    .then(function(data) {
        var facts = data.facts || [];
        if (facts.length === 0) {
            factsEl.innerHTML = '<p class="text-xs text-gray-500">No facts found for this source.</p>';
            return;
        }
        factsEl.innerHTML =
            '<p class="text-xs font-medium text-gray-500 mb-2">Facts (' + facts.length + ')</p>' +
            '<ol class="space-y-1.5 list-none">' +
            facts.map(function(f, i) {
                var kindCls = f.kind === 'KNOWLEDGE'
                    ? 'bg-blue-50 text-blue-700'
                    : f.kind === 'RULE'
                    ? 'bg-purple-50 text-purple-700'
                    : 'bg-amber-50 text-amber-700';
                var factUrl = f.thread_id ? '/ownerhub/threads/' + f.thread_id + '#fact-' + f.id : null;
                var suppByUrl = (f.superseded_by && f.thread_id) ? '/ownerhub/threads/' + f.thread_id + '#fact-' + f.superseded_by : null;
                var idHtml = factUrl
                    ? '<a href="' + escAttr(factUrl) + '" target="_blank" class="text-blue-600 hover:underline font-mono">' + escHtml(f.id) + '</a>'
                    : '<span class="text-gray-400 font-mono">' + escHtml(f.id) + '</span>';
                var suppHtml = '';
                if (f.superseded_by) {
                    suppHtml += '<span class="text-orange-600">Superseded</span>';
                    if (f.superseded_at) suppHtml += ' <span class="text-gray-400">' + escHtml(f.superseded_at) + '</span>';
                    if (suppByUrl) suppHtml += ' <a href="' + escAttr(suppByUrl) + '" target="_blank" class="text-blue-600 hover:underline">\u2192 successor</a>';
                    else if (f.superseded_by) suppHtml += ' <span class="text-gray-400">\u2192 ' + escHtml(f.superseded_by) + '</span>';
                }
                return '<li class="flex items-start gap-2 text-sm">' +
                    '<span class="shrink-0 text-xs text-gray-400 font-mono w-4 mt-0.5">' + (i+1) + '</span>' +
                    '<span class="shrink-0 px-1.5 py-0.5 text-[10px] font-medium rounded ' + kindCls + '">' + escHtml(f.kind) + '</span>' +
                    '<div class="flex-1 flex flex-col gap-0.5">' +
                        '<span class="text-gray-900">' + escHtml(f.text) + '</span>' +
                        '<div class="flex items-center gap-2 flex-wrap text-[10px] mt-0.5">' +
                            idHtml +
                            (suppHtml ? '<span class="text-gray-300">\u00b7</span>' + suppHtml : '') +
                            (f.source_id ? '<button onclick="openSourceModal(\'' + escAttr(f.source_id) + '\')" class="text-blue-600 hover:underline">View source</button>' : '') +
                        '</div>' +
                    '</div>' +
                '</li>';
            }).join('') +
            '</ol>';
    })
    .catch(function(err) {
        console.error('locomo recall error:', err);
        factsEl.innerHTML = '<p class="text-xs text-red-600">Error: ' + escHtml(String(err.message || err)) + '</p>';
    });
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escHtml(s) {
    if (!s) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

if (initialLocomoContext.query) {
    doSearch();
}
</script>
{{end}}
