basePath: /
definitions:
  api.apiError:
    properties:
      error:
        type: string
    type: object
  api.healthResponse:
    properties:
      status:
        type: string
    type: object
  memory.Agent:
    properties:
      account_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  memory.AgentCreateBody:
    properties:
      name:
        type: string
    type: object
  memory.ConversationMessage:
    properties:
      content:
        type: string
      created_at:
        type: string
      event_id:
        type: string
      kind:
        $ref: '#/definitions/memory.SourceKind'
      source_id:
        type: string
      thread_id:
        type: string
    type: object
  memory.EvaluateResult:
    properties:
      facts_to_evolve:
        description: Facts superseded by new information; old fact is preserved with
          lineage.
        items:
          $ref: '#/definitions/memory.FactEvolution'
        type: array
      facts_to_return:
        description: Relevant existing + new facts to return to the agent.
        items:
          $ref: '#/definitions/memory.Fact'
        type: array
      facts_to_store:
        description: New facts to insert.
        items:
          $ref: '#/definitions/memory.Fact'
        type: array
      facts_to_update:
        description: Existing facts contradicted by higher/equal trust source.
        items:
          $ref: '#/definitions/memory.Fact'
        type: array
    type: object
  memory.Fact:
    properties:
      account_id:
        type: string
      agent_id:
        type: string
      created_at:
        type: string
      embedding:
        items:
          type: number
        type: array
      id:
        type: string
      kind:
        $ref: '#/definitions/memory.FactKind'
      source_id:
        description: The source that produced this fact.
        type: string
      superseded_at:
        description: Non-nil means this fact has been evolved into a successor.
        type: string
      superseded_by:
        description: ID of the successor fact.
        type: string
      text:
        type: string
      thread_id:
        description: Null means agent-level or account-level scope.
        type: string
      updated_at:
        type: string
    type: object
  memory.FactEvolution:
    properties:
      new_kind:
        $ref: '#/definitions/memory.FactKind'
      new_text:
        type: string
      old_fact_id:
        type: string
    type: object
  memory.FactKind:
    enum:
    - KNOWLEDGE
    - RULE
    - PREFERENCE
    type: string
    x-enum-comments:
      FACT_KIND_KNOWLEDGE: Factual information. Retrieved only when semantically relevant.
      FACT_KIND_PREFERENCE: Soft weight for decisions. Retrieved when relevant to
        choices.
      FACT_KIND_RULE: Always included in retrieval. User-defined rules.
    x-enum-descriptions:
    - Factual information. Retrieved only when semantically relevant.
    - Always included in retrieval. User-defined rules.
    - Soft weight for decisions. Retrieved when relevant to choices.
    x-enum-varnames:
    - FACT_KIND_KNOWLEDGE
    - FACT_KIND_RULE
    - FACT_KIND_PREFERENCE
  memory.FactListOutput:
    properties:
      facts:
        items:
          $ref: '#/definitions/memory.ReturnedFact'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  memory.FactUpdateBody:
    properties:
      source:
        $ref: '#/definitions/memory.SourceKind'
      text:
        type: string
    type: object
  memory.FactualInput:
    properties:
      inputs:
        items:
          $ref: '#/definitions/memory.InputItem'
        type: array
      thread_id:
        type: string
    type: object
  memory.InputItem:
    properties:
      content:
        description: Text as string, files as base64.
        type: string
      content_type:
        description: 'MIME type: text/plain, application/pdf, image/png, etc.'
        type: string
      kind:
        $ref: '#/definitions/memory.SourceKind'
    type: object
  memory.MemoryInput:
    properties:
      include_sources:
        description: When true, return original source content with facts.
        type: boolean
      inputs:
        items:
          $ref: '#/definitions/memory.InputItem'
        type: array
      message_history:
        description: Number of recent raw messages to return. 0 = facts only.
        type: integer
      thread_id:
        type: string
    type: object
  memory.MemoryOutput:
    properties:
      facts:
        description: Relevant facts for the agent.
        items:
          $ref: '#/definitions/memory.ReturnedFact'
        type: array
      messages:
        description: Recent USER/AGENT messages from sources. Empty if MessageHistory
          is 0.
        items:
          $ref: '#/definitions/memory.ConversationMessage'
        type: array
    type: object
  memory.RecallInput:
    properties:
      agent_id:
        type: string
      limit:
        type: integer
      query:
        type: string
      thread_id:
        type: string
    type: object
  memory.ReturnedFact:
    properties:
      id:
        type: string
      kind:
        $ref: '#/definitions/memory.FactKind'
      original_source:
        description: Populated only if IncludeSources is true.
        type: string
      source_kind:
        $ref: '#/definitions/memory.SourceKind'
      text:
        type: string
    type: object
  memory.SourceKind:
    enum:
    - SYSTEM
    - USER
    - AGENT
    - TOOL
    - DOCUMENT
    - CODE
    type: string
    x-enum-comments:
      SOURCE_AGENT: The agent's own generated output.
      SOURCE_CODE: Source code, configuration files, schemas, technical artifacts.
      SOURCE_DOCUMENT: Any non-code reference material. PDFs, text files, spreadsheets.
      SOURCE_SYSTEM: Current date, thread info, environment variables. Immutable.
      SOURCE_TOOL: Output from any tool or sub-agent invoked by the agent.
      SOURCE_USER: Input from whoever is initiating the request to the agent.
    x-enum-descriptions:
    - Current date, thread info, environment variables. Immutable.
    - Input from whoever is initiating the request to the agent.
    - The agent's own generated output.
    - Output from any tool or sub-agent invoked by the agent.
    - Any non-code reference material. PDFs, text files, spreadsheets.
    - Source code, configuration files, schemas, technical artifacts.
    x-enum-varnames:
    - SOURCE_SYSTEM
    - SOURCE_USER
    - SOURCE_AGENT
    - SOURCE_TOOL
    - SOURCE_DOCUMENT
    - SOURCE_CODE
  memory.Thread:
    properties:
      account_id:
        type: string
      agent_id:
        type: string
      created_at:
        type: string
      id:
        type: string
    type: object
  memory.ThreadCreateBody:
    properties:
      agent_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API for the Agent Memory service.
  title: Agent Memory API
  version: "1.0"
paths:
  /agents:
    post:
      consumes:
      - application/json
      description: Create a new agent under the authenticated account.
      parameters:
      - description: Create Agent Body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memory.AgentCreateBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/memory.Agent'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Create Agent
      tags:
      - agents
  /agents/{id}:
    delete:
      description: Delete one agent and all related records under the authenticated
        account.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{"status":"deleted"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Delete Agent
      tags:
      - agents
    get:
      description: Retrieve one agent by ID under the authenticated account.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.Agent'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Get Agent
      tags:
      - agents
  /facts:
    get:
      description: List facts scoped to the account, with optional agent, thread,
        and kind filters.
      parameters:
      - description: Agent ID
        in: query
        name: agent_id
        type: string
      - description: Thread ID
        in: query
        name: thread_id
        type: string
      - description: Fact kind (KNOWLEDGE, RULE, PREFERENCE)
        in: query
        name: kind
        type: string
      - description: Max results (default 50)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.FactListOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: List Facts
      tags:
      - facts
  /facts/{id}:
    delete:
      description: Delete a specific fact by its ID.
      parameters:
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Delete Fact
      tags:
      - facts
    get:
      description: Retrieve a specific fact by its ID, optionally including original
        sources.
      parameters:
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      - description: Include original sources
        in: query
        name: include_sources
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.Fact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Get Fact
      tags:
      - facts
    put:
      consumes:
      - application/json
      description: Update the text and source of an existing fact.
      parameters:
      - description: Fact ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memory.FactUpdateBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.Fact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Update Fact
      tags:
      - facts
  /health:
    get:
      description: Get the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.healthResponse'
      summary: Health Check
      tags:
      - health
  /memory/contextual:
    post:
      consumes:
      - application/json
      description: Process input through the contextual smart pipeline to retrieve
        relevant facts and messages.
      parameters:
      - description: Memory Input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/memory.MemoryInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.MemoryOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Process Contextual Memory
      tags:
      - memory
  /memory/factual:
    post:
      consumes:
      - application/json
      description: Add new facts to the memory engine.
      parameters:
      - description: Factual Input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/memory.FactualInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.EvaluateResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Add Factual Memory
      tags:
      - memory
  /memory/recall:
    post:
      consumes:
      - application/json
      description: Retrieve relevant facts by semantic similarity to a query. No storage
        or mutation.
      parameters:
      - description: Recall Input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/memory.RecallInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.MemoryOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Recall Memory
      tags:
      - memory
  /threads:
    post:
      consumes:
      - application/json
      description: Create a new thread for an agent under the authenticated account.
      parameters:
      - description: Create Thread Body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/memory.ThreadCreateBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/memory.Thread'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Create Thread
      tags:
      - threads
  /threads/{id}:
    delete:
      description: Delete one thread and all related thread-scoped records under the
        authenticated account.
      parameters:
      - description: Thread ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{"status":"deleted"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Delete Thread
      tags:
      - threads
    get:
      description: Retrieve one thread under the authenticated account.
      parameters:
      - description: Thread ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/memory.Thread'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiError'
      security:
      - ApiKeyAuth: []
      summary: Get Thread
      tags:
      - threads
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
